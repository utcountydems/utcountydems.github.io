              - { label: "Position Name", name: "name", widget: "string" }
              - { label: "Term Badge Text", name: "term", widget: "string" }
              - { label: "Icon Class", name: "icon", widget: "string" }
              - { label: "Description Paragraph 1", name: "desc1", widget: "text" }
              - { label: "Description Paragraph 2", name: "desc2", widget: "text" }
              - { label: "Description Paragraph 3", name: "desc3", widget: "text" }
              - label: "Responsibilities"
                name: "responsibilities"
                widget: "list"
                field: { label: "Responsibility", name: "item", widget: "string" }

          - label: "CTA Strip"
            name: "cta_strip"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body Text", name: "body", widget: "text" }
              - { label: "Primary Button Text", name: "primary_btn_text", widget: "string" }
              - { label: "Primary Button URL", name: "primary_btn_url", widget: "string" }
              - { label: "Secondary Button Text", name: "secondary_btn_text", widget: "string" }
              - { label: "Secondary Button URL", name: "secondary_btn_url", widget: "string" }

      # ─────────────────────────────────────────────
      # CAUCUS RULES PAGE
      # ─────────────────────────────────────────────
      - name: "caucus-rules"
        label: "Caucus Rules Page"
        file: "content/pages/caucus-rules.md"
        fields:
          - { label: "Page Title", name: "page_title", widget: "string" }
          - { label: "Meta Description", name: "meta_description", widget: "text" }
          - { label: "Header Tag", name: "header_tag", widget: "string" }
