            name: "downloads_section"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "sub", widget: "text" }
              - label: "Download Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "Download URL (leave blank if pending)", name: "url", widget: "string", required: false }
                  - { label: "Pending Label", name: "pending_label", widget: "string" }

          - label: "Callout Box"
            name: "callout"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body Text (HTML ok)", name: "body", widget: "text" }

