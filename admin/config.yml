              - { label: "Subtitle", name: "sub", widget: "text" }
              - label: "Rules Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Icon Class", name: "icon", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Intro Text", name: "intro", widget: "text" }
                  - label: "Bullet Points"
                    name: "bullets"
                    widget: "list"
                    field: { label: "Bullet", name: "item", widget: "string" }

          - label: "Ballot Steps Section"
            name: "ballot_section"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "sub", widget: "text" }
              - label: "Steps"
