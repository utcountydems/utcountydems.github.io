backend:
  name: github
  repo: CarrenUCDP/CaucusConnect
  branch: main
  base_url: https://api.netlify.com

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:

      # ─────────────────────────────────────────────
      # HOME PAGE
      # ─────────────────────────────────────────────
      - name: "home"
        label: "Home Page"
        file: "content/pages/index.md"
        fields:
          - { label: "Page Title (browser tab)", name: "page_title", widget: "string" }
          - { label: "Meta Description", name: "meta_description", widget: "text" }

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Badge Text", name: "badge", widget: "string" }
              - { label: "Headline Line 1", name: "headline1", widget: "string" }
              - { label: "Headline Line 2", name: "headline2", widget: "string" }
              - { label: "Headline Line 3 (blue accent)", name: "headline3", widget: "string" }
              - { label: "Event Date Line", name: "date_line", widget: "string" }
              - { label: "Event Subtitle", name: "date_sub", widget: "string" }
              - { label: "Body Text", name: "body", widget: "text" }
              - { label: "Primary CTA Text", name: "primary_cta_text", widget: "string" }
              - { label: "Primary CTA URL", name: "primary_cta_url", widget: "string" }
              - { label: "Secondary CTA Text", name: "secondary_cta_text", widget: "string" }
              - { label: "Secondary CTA URL", name: "secondary_cta_url", widget: "string" }
              - { label: "Countdown Target Date/Time (ISO format)", name: "countdown_target", widget: "string" }

          - label: "Get Started Cards"
            name: "get_started"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Section Heading", name: "heading", widget: "string" }
              - { label: "Section Subtitle", name: "sub", widget: "text" }
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Icon Class", name: "icon", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "Link URL", name: "url", widget: "string" }
                  - { label: "Link Text", name: "link_text", widget: "string" }

          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body Paragraph 1", name: "body1", widget: "text" }
              - { label: "Body Paragraph 2", name: "body2", widget: "text" }
              - { label: "Body Paragraph 3", name: "body3", widget: "text" }
              - { label: "Callout Text", name: "callout", widget: "text" }
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Number", name: "number", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }

          - label: "Locator Teaser Section"
            name: "locator"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "sub", widget: "text" }
              - label: "Feature Bullets"
                name: "bullets"
                widget: "list"
                fields:
                  - { label: "Icon Class (Font Awesome)", name: "icon", widget: "string", hint: "E.g. fa-solid fa-tag" }
                  - { label: "Bullet Text", name: "text", widget: "string" }

          - label: "Timeline Section"
            name: "timeline"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Timeline Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Time", name: "time", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }

          - label: "Leadership Section"
            name: "leadership"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "sub", widget: "text" }
              - label: "Leaders"
                name: "leaders"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Title / Role", name: "title", widget: "string" }
                  - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Upload a headshot photo" }

          - label: "Contact Section"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Contact Email", name: "email", widget: "string" }
              - { label: "Contact Phone", name: "phone", widget: "string", required: false }
              - { label: "Contact Address", name: "address", widget: "string" }
              - { label: "Contact Website", name: "website", widget: "string" }

      # ─────────────────────────────────────────────
      # CANDIDATE PAGE
      # ─────────────────────────────────────────────
      - name: "candidate"
        label: "Candidate Page"
        file: "content/pages/candidate.md"
        fields:
          - { label: "Page Title", name: "page_title", widget: "string" }
          - { label: "Meta Description", name: "meta_description", widget: "text" }
          - { label: "Header Tag", name: "header_tag", widget: "string" }
          - { label: "Header H1", name: "header_h1", widget: "string" }
          - { label: "Header Subtitle", name: "header_subtitle", widget: "text" }

          - label: "Position Cards Section"
            name: "positions_section"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "sub", widget: "text" }
              - label: "Position Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Icon Class", name: "icon", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Term Label", name: "term", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }
                  - label: "Bullet Points"
                    name: "bullets"
                    widget: "list"
                    field: { label: "Bullet", name: "item", widget: "string" }
                  - { label: "Link Text", name: "link_text", widget: "string" }
                  - { label: "Link URL", name: "link_url", widget: "string" }

          - label: "Prepare Your Campaign Section"
            name: "prepare_section"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "sub", widget: "text" }
              - label: "Steps"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "Step Title", name: "title", widget: "string" }
                  - { label: "Step Description", name: "desc", widget: "text" }
              - label: "Tips Card"
                name: "tips"
                widget: "object"
                fields:
                  - { label: "Tips Heading", name: "heading", widget: "string" }
                  - label: "Tips"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Icon Class", name: "icon", widget: "string" }
                      - { label: "Tip Text (HTML ok)", name: "text", widget: "text" }

          - label: "Virtual Nomination CTA"
            name: "nomination_cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body Text", name: "body", widget: "text" }
              - { label: "Button Text", name: "btn_text", widget: "string" }
              - { label: "Button URL", name: "btn_url", widget: "string" }

          - label: "After Winning Section"
            name: "after_section"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Icon Class", name: "icon", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }

          - label: "Callout Box"
            name: "callout"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body Text (HTML ok)", name: "body", widget: "text" }

      # ─────────────────────────────────────────────
      # MEMBER PAGE
      # ─────────────────────────────────────────────
      - name: "member"
        label: "Member / Attendee Page"
        file: "content/pages/member.md"
        fields:
          - { label: "Page Title", name: "page_title", widget: "string" }
          - { label: "Meta Description", name: "meta_description", widget: "text" }
          - { label: "Header Tag", name: "header_tag", widget: "string" }
          - { label: "Header H1", name: "header_h1", widget: "string" }
          - { label: "Header Subtitle", name: "header_subtitle", widget: "text" }

          - label: "Checklist Section"
            name: "checklist_section"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "sub", widget: "text" }
              - label: "Steps"
                name: "steps"
                widget: "list"
                field: { label: "Step", name: "item", widget: "string" }

          - label: "What to Bring"
            name: "bring_section"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Icon Class", name: "icon", widget: "string" }
                  - { label: "Item Title", name: "title", widget: "string" }
                  - { label: "Item Description", name: "desc", widget: "text" }

          - label: "Timeline Section"
            name: "timeline_section"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Timeline Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Time", name: "time", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }

          - label: "CTA Strip"
            name: "cta_strip"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body Text", name: "body", widget: "text" }
              - { label: "Button Text", name: "btn_text", widget: "string" }
              - { label: "Button URL", name: "btn_url", widget: "string" }

      # ─────────────────────────────────────────────
      # HOST PAGE
      # ─────────────────────────────────────────────
      - name: "host"
        label: "Host & Volunteer Page"
        file: "content/pages/host.md"
        fields:
          - { label: "Page Title", name: "page_title", widget: "string" }
          - { label: "Meta Description", name: "meta_description", widget: "text" }
          - { label: "Header Tag", name: "header_tag", widget: "string" }
          - { label: "Header H1", name: "header_h1", widget: "string" }
          - { label: "Header Subtitle", name: "header_subtitle", widget: "text" }

          - label: "Training Section"
            name: "training_section"
            widget: "object"
            fields:
