                  - { label: "Skill Label", name: "label", widget: "string" }

          - label: "Donate Section"
            name: "donate_section"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "sub", widget: "text" }
              - { label: "Donate Button Text", name: "btn_text", widget: "string" }
              - { label: "Donate Button URL", name: "btn_url", widget: "string" }

      # ─────────────────────────────────────────────
      # CAUCUSES PAGE
      # ─────────────────────────────────────────────
      - name: "caucuses"
        label: "Issue & Identity Caucuses Page"
        file: "content/pages/caucuses.md"
        fields:
          - { label: "Page Title", name: "page_title", widget: "string" }
          - { label: "Meta Description", name: "meta_description", widget: "text" }
          - { label: "Header Tag", name: "header_tag", widget: "string" }
          - { label: "Header H1", name: "header_h1", widget: "string" }
          - { label: "Header Subtitle", name: "header_subtitle", widget: "text" }

          - label: "Caucus Cards Section"
            name: "caucuses_section"
            widget: "object"
            fields:
              - { label: "Section Tag", name: "tag", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "sub", widget: "text" }
              - label: "Caucus Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Caucus Name", name: "name", widget: "string" }
                  - { label: "CSS Class (e.g. caucus-lds)", name: "css_class", widget: "string" }
                  - { label: "Icon Class", name: "icon", widget: "string" }
                  - { label: "Anchor ID", name: "id", widget: "string" }
                  - { label: "Mission Statement", name: "mission", widget: "text" }
                  - { label: "How to Join", name: "how_to_join", widget: "text" }
                  - { label: "Website URL (leave blank if pending)", name: "website_url", widget: "string", required: false }
                  - { label: "Direct Contact URL (leave blank if pending)", name: "contact_url", widget: "string", required: false }

          - label: "Callout Box"
            name: "callout"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body Text (HTML ok)", name: "body", widget: "text" }

          - label: "How It Works Section"
            name: "how_section"
            widget: "object"
            fields:
