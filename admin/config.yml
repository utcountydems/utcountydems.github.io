  # ─────────────────────────────────────────────
  # SITE SETTINGS (Nav & Footer)
  # ─────────────────────────────────────────────
  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - name: "site"
        label: "Navigation & Footer"
        file: "_data/site.yaml"
        format: yaml
        fields:
          - label: "Navigation"
            name: "nav"
            widget: "object"
            summary: "CTA button shown in the top nav on every page"
            fields:
              - { label: "CTA Button Text", name: "cta_text", widget: "string", hint: "E.g. Find My Precinct →" }
              - { label: "CTA Button URL", name: "cta_url", widget: "string", hint: "E.g. /precinct-locator.html" }

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Footer Description", name: "description", widget: "string", hint: "One-line description shown under the logo" }
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false, hint: "Leave blank to hide the icon" }
              - { label: "Twitter / X URL", name: "twitter", widget: "string", required: false, hint: "Leave blank to hide the icon" }
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false, hint: "Leave blank to hide the icon" }
              - { label: "Copyright Line", name: "copyright", widget: "string", hint: "E.g. © 2026 Utah County Democratic Party · CaucusConnect" }
              - label: "Footer Link Columns"
                name: "columns"
                widget: "list"
                summary: "{{fields.heading}}"
                fields:
                  - { label: "Column Heading", name: "heading", widget: "string" }
                  - label: "Links"
                    name: "links"
                    widget: "list"
                    fields:
                      - { label: "Link Text", name: "text", widget: "string" }
                      - { label: "Link URL", name: "url", widget: "string" }
                      - { label: "Open in New Tab (external link)", name: "external", widget: "boolean", default: false, required: false }
